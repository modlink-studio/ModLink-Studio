[project]
name = "modlink-core"
version = "0.1.0"
description = "Runtime services and engine for ModLink"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
requires-python = ">=3.13"
dependencies = [
    "modlink-sdk",
    "modlink-qt",
    "numpy>=2.3.3",
]

[project.urls]
Homepage = "https://github.com/modlink-studio/ModLink-Studio"
Repository = "https://github.com/modlink-studio/ModLink-Studio"
Documentation = "https://modlink-studio.github.io"
Issues = "https://github.com/modlink-studio/ModLink-Studio/issues"
Packages = "https://dl.cloudsmith.io/public/xylt-space/modlink-studio/python/simple/"

[tool.uv.sources]
modlink-sdk = { workspace = true }
modlink-qt = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
