[project]
name = "modlink-core"
version = "0.1.0"
description = "Runtime services and engine for ModLink"
requires-python = ">=3.13"
dependencies = [
    "modlink-sdk",
    "numpy>=2.3.3",
    "pyqt6>=6.10.2",
]

[tool.uv.sources]
modlink-sdk = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
