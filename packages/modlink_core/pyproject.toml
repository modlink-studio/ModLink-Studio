[project]
name = "modlink-core"
version = "0.3.2rc1"
description = "Runtime services and engine for ModLink"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
requires-python = ">=3.13"
dependencies = [
    "modlink-sdk",
    "imageio-ffmpeg>=0.4.9",
    "numpy>=2.3.3",
    "pillow>=11.2.1",
    "platformdirs>=4.9.4",
]

[project.urls]
Homepage = "https://github.com/modlink-studio/ModLink-Studio"
Repository = "https://github.com/modlink-studio/ModLink-Studio"
Documentation = "https://modlink-studio.github.io"
Issues = "https://github.com/modlink-studio/ModLink-Studio/issues"

[tool.uv.sources]
modlink-sdk = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""

[tool.pytest.ini_options]
norecursedirs = [
    ".pytest_cache",
    ".tmp-tests",
    "_tmp_runtime*",
    "pytest-cache-files-*",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]
