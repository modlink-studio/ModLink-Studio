[project]
name = "modlink_ui_v2"
version = "0.3.0rc1"
description = "Feature-oriented Qt Widgets UI components for ModLink"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
requires-python = ">=3.13"
dependencies = [
    "modlink-core",
    "pyqt6>=6.10.2",
    "pyqt6-fluent-widgets>=1.11.1",
    "pyqtgraph>=0.13.7",
    "scipy>=1.14.1",
]

[project.urls]
Homepage = "https://github.com/modlink-studio/ModLink-Studio"
Repository = "https://github.com/modlink-studio/ModLink-Studio"
Documentation = "https://modlink-studio.github.io"
Issues = "https://github.com/modlink-studio/ModLink-Studio/issues"

[tool.uv.sources]
modlink-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
module-name = "modlink_ui_v2"
