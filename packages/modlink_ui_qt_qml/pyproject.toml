[project]
name = "modlink_ui_qt_qml"
version = "0.2.0"
description = "Qt QML UI package for ModLink Studio"
license = "GPL-3.0-or-later"
requires-python = ">=3.13"
dependencies = [
    "modlink-core",
    "modlink-qt-bridge",
    "modlink-sdk",
    "numpy>=2.3.3",
    "pyqt6>=6.10.2",
    "scipy>=1.15.2",
]

[project.urls]
Homepage = "https://github.com/modlink-studio/ModLink-Studio"
Repository = "https://github.com/modlink-studio/ModLink-Studio"
Documentation = "https://modlink-studio.github.io"
Issues = "https://github.com/modlink-studio/ModLink-Studio/issues"

[tool.uv.sources]
modlink-core = { workspace = true }
modlink-qt-bridge = { workspace = true }
modlink-sdk = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
module-name = "modlink_ui_qt_qml"
