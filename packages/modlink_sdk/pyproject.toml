[project]
name = "modlink-sdk"
version = "0.1.0"
description = "Shared SDK contracts and data models for ModLink"
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.3.3",
    "pyqt6>=6.10.2",
]

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
