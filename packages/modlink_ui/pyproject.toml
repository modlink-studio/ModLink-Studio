[project]
name = "modlink-ui"
version = "0.1.0"
description = "Qt UI components for ModLink"
requires-python = ">=3.13"
dependencies = [
    "modlink-core",
    "pyqt6>=6.10.2",
    "pyqt6-fluent-widgets>=1.11.1",
    "pyqtgraph>=0.13.7",
    "scipy>=1.14.1",
]

[tool.uv.sources]
modlink-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-root = ""
