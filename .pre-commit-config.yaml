repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: biome-plugin-scaffold
        name: biome (plugin scaffold)
        entry: npm --workspace @modlink-studio/plugin-scaffold run lint:fix
        language: system
        pass_filenames: false
        files: ^tools/modlink_plugin_scaffold/
