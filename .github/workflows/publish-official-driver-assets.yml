name: Publish Official Driver Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "value=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release tag
        run: git checkout "${{ steps.release_tag.outputs.value }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Build official driver wheels
        run: |
          rm -rf dist/plugins
          mkdir -p dist/plugins/host-camera
          mkdir -p dist/plugins/host-microphone
          mkdir -p dist/plugins/openbci-ganglion
          uv build plugins/host-camera -o dist/plugins/host-camera
          uv build plugins/host-microphone -o dist/plugins/host-microphone
          uv build plugins/openbci-ganglion -o dist/plugins/openbci-ganglion

      - name: Upload official driver wheels to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for wheel in dist/plugins/*/*.whl; do
            gh release upload "${{ steps.release_tag.outputs.value }}" "$wheel" --clobber
          done
