name: Publish Python Package

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install uv

      - name: Build modlink-studio distribution
        run: |
          rm -rf build dist modlink_studio.egg-info
          mkdir -p dist/modlink-studio
          uv build -o dist/modlink-studio

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/modlink-studio/
