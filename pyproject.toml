[project]
name = "modlink-studio"
version = "0.1.0"
description = "ModLink Studio is a multimodal data acquisition frontend built with PyQt6 and qfluentwidgets"
readme = "README.md"
authors = [
    { name = "Zhaoyang Xin", email = "xincy22@mails.tsinghua.edu.cn" }
]
requires-python = ">=3.13"
dependencies = [
    "bleak>=2.1.1",
    "brainflow>=5.20.1,<6",
    "opencv-python>=4.10.0.84",
    "numpy>=2.3.3",
    "pyserial>=3.5",
    "pyqt6>=6.10.2",
    "pyqt6-fluent-widgets>=1.11.1",
]

[project.scripts]
modlink-studio = "apps.modlink_studio.app:main"

[project.entry-points."modlink.drivers"]
minimal = "packages.modlink_drivers.minimal:create_minimal_driver"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "apps",
    "packages"
]

[dependency-groups]
dev = [
    "black>=26.3.1",
    "pyinstaller>=6.16.0",
]
