[project]
name = "modlink-workspace"
version = "0.1.0"
description = "Workspace root for ModLink Studio"
requires-python = ">=3.13"
dependencies = ["modlink-studio"]

[project.optional-dependencies]
openbciganglion = ["openbciganglion"]
microphone-demo = ["microphone-demo"]
webcam = ["webcam"]
drivers-all = [
    "openbciganglion",
    "microphone-demo",
    "webcam",
]

[tool.uv]
default-groups = ["dev"]

[tool.uv.sources]
modlink-studio = { workspace = true }
modlink-core = { workspace = true }
modlink-sdk = { workspace = true }
modlink-ui = { workspace = true }
openbciganglion = { path = "plugins/openbciganglion", editable = true }
microphone-demo = { path = "plugins/microphone_demo", editable = true }
webcam = { path = "plugins/webcam", editable = true }

[tool.uv.workspace]
members = [
    "apps/modlink_studio",
    "packages/modlink_sdk",
    "packages/modlink_core",
    "packages/modlink_ui",
]

[dependency-groups]
dev = [
    "black>=26.3.1",
    "pdoc>=16.0.0",
    "pyinstaller>=6.16.0",
    "rich>=14.3.3",
]
